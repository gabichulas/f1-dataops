name: F1 DataOps Deploy

on:
  pull_request:
    branches: [main]

  push:
    branches:
      - '**'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  TF_WORKDIR: ${{ vars.TF_WORKDIR }}
  PUBLIC_IP: ${{ vars.PUBLIC_IP }}


jobs:
  setup:
    name: Setup Variables
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.calc.outputs.sha }}
    
    steps:
      - name: Calculate short SHA
        id: calc
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  py-test:
    name: Python Linting and Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r src/requirements.txt
      - run: pip install -r terraform/functions/scheduler/requirements.txt
      - run: pip install pytest flake8
      - run: flake8 src/ terraform/functions/scheduler/ --max-line-length=120

  infra-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest
    needs: [py-test, setup]

    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform init

      - name: Terraform Fmt Check
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform plan -input=false -no-color
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_extractor_image_tag: ${{ needs.setup.outputs.short_sha }}

  deploy:
    name: Deploy
    needs: [infra-checks, setup]
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push extractor image
        shell: bash
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/f1-pipeline-repo/f1-extractor:${GITHUB_SHA::7}"
          docker build -t "$IMAGE" ./src
          docker push "$IMAGE"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_extractor_image_tag: ${{ needs.setup.outputs.short_sha }}
          TF_VAR_public_ip: ${{ env.PUBLIC_IP }}
  
